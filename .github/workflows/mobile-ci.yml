name: Mobile CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint domain package
        run: npm run typecheck --workspace=@fleet-portal/domain

      - name: Lint shared package
        run: npm run typecheck --workspace=@fleet-portal/shared

      - name: Test domain
        run: npm run test --workspace=@fleet-portal/domain

      - name: Test shared
        run: npm run test --workspace=@fleet-portal/shared

      - name: Test API use-cases
        run: npm run test --workspace=@fleet-portal/api

  eas-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build
        working-directory: apps/mobile
        run: eas build --platform all --non-interactive
