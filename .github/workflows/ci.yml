name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npm run build --workspace=@fleet-portal/domain --workspace=@fleet-portal/shared

      - name: Typecheck
        run: |
          npm run typecheck --workspace=@fleet-portal/domain
          npm run typecheck --workspace=@fleet-portal/shared
          npm run typecheck --workspace=@fleet-portal/api
          npm run typecheck --workspace=@fleet-portal/web

      - name: Unit tests
        run: |
          npm run test --workspace=@fleet-portal/domain
          npm run test --workspace=@fleet-portal/shared
          npm run test --workspace=@fleet-portal/api
          npm run test --workspace=@fleet-portal/web
          npm run test --workspace=@fleet-portal/mobile

  k6-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure + API
        run: |
          docker compose up -d timescaledb redis redpanda redpanda-init
          docker compose up -d api --build
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3001/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 3
          done
          echo "API failed to become healthy"
          docker compose logs api
          exit 1

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | \
            sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: k6 smoke load test
        run: k6 run -e API_URL=http://localhost:3001 infra/k6/smoke.js

  eas-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: EAS Build
        working-directory: apps/mobile
        run: eas build --platform all --non-interactive
